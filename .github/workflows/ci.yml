name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: chatdev-remote-${{ github.sha }}
          path: chatdev-remote-*.vsix
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package="$(find . -maxdepth 1 -name 'chatdev-remote-*.vsix' -print -quit)"
          cp "$package" chatdev-remote.vsix
          gh release create "$GITHUB_REF_NAME" "$package" chatdev-remote.vsix --generate-notes --verify-tag
